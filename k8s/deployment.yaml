apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniedu-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omniedu-web
  template:
    metadata:
      labels:
        app: omniedu-web
    spec:
      containers:
        - name: omniedu-web
          image: ghcr.io/example/omniedu:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: omniedu-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: omniedu-secrets
                  key: redis-url
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: omniedu-secrets
                  key: auth-secret
