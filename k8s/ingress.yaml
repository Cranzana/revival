apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omniedu-web
spec:
  rules:
    - host: omniedu.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omniedu-web
                port:
                  number: 80
