version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omniedu
      POSTGRES_USER: omniedu
      POSTGRES_PASSWORD: omniedu
    ports:
      - "5432:5432"
    volumes:
      - omniedu-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - omniedu-redis:/data

volumes:
  omniedu-postgres:
  omniedu-redis:
